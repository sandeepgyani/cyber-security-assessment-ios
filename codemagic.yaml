workflows:
  ios-release:
    name: iOS Release (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: PCS_ASC_KEY
    environment:
      ios_signing:
        certificates:
          - pcs_distribution
        provisioning_profiles:
          - pcs_appstore_profile
      node: latest
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Sync web assets into iOS project
        script: |
          node -v
          npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
  macos-release:
    name: macOS Release (native)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: PCS_ASC_KEY
    environment:
      ios_signing:
        certificates:
          - pcs_distribution
        provisioning_profiles:
          - pcs_macos_profile
      xcode: latest
    scripts:
      - name: Create Mac Installer certificate (fresh key on this machine)
        script: |
          set -e
          # Generate a private key on this ephemeral machine, create the installer
          # certificate from it via the ASC API, and capture the certificate content.
          openssl genrsa -out /tmp/inst_key.pem 2048
          app-store-connect certificates create \
            --type MAC_INSTALLER_DISTRIBUTION \
            --certificate-key=@file:/tmp/inst_key.pem \
            --json > /tmp/cert.json
          python3 -c "import json; d=json.load(open('/tmp/cert.json')); n=d.get('data') or d; a=n['attributes'] if isinstance(n,dict) and 'attributes' in n else n; print(a['certificateContent'])" > /tmp/cert.b64
          tr -d '\n\r' < /tmp/cert.b64 > /tmp/cert.oneline
          openssl base64 -d -A -in /tmp/cert.oneline -out /tmp/inst.cer
          openssl x509 -inform DER -in /tmp/inst.cer -out /tmp/inst.pem
          # Use legacy PKCS12 algorithms so macOS `security import` can parse it
          # (OpenSSL 3 defaults produce a MAC the Security framework rejects).
          openssl pkcs12 -export -inkey /tmp/inst_key.pem -in /tmp/inst.pem \
            -out /tmp/installer.p12 -passout pass:pcs -name "Mac Installer" \
            -keypbe PBE-SHA1-3DES -certpbe PBE-SHA1-3DES -macalg sha1 \
          || /usr/bin/openssl pkcs12 -export -inkey /tmp/inst_key.pem -in /tmp/inst.pem \
            -out /tmp/installer.p12 -passout pass:pcs -name "Mac Installer"
          echo "installer p12 rebuilt"
      - name: Build macOS archive and package pkg
        script: |
          set -e
          xcodebuild -project macos/MacApp.xcodeproj -scheme MacApp \
            -destination 'generic/platform=macOS' \
            -archivePath build/macos/App.xcarchive archive
          APP=$(find build/macos/App.xcarchive/Products/Applications -maxdepth 1 -name '*.app' | head -1)
          echo "=== Archived app: $APP ==="
          [ -f "$APP/Contents/embedded.provisionprofile" ] && echo "embedded.provisionprofile PRESENT" || echo "WARNING: no embedded profile"
          # Import the installer cert into a keychain we fully control, granting
          # productbuild explicit non-interactive access to its private key.
          KC="$HOME/Library/Keychains/mac-signing.keychain-db"
          security create-keychain -p pcs "$KC" || true
          security set-keychain-settings "$KC"
          security unlock-keychain -p pcs "$KC"
          security import /tmp/installer.p12 -k "$KC" -P pcs -A \
            -T /usr/bin/productbuild -T /usr/bin/pkgbuild -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k pcs "$KC" >/dev/null 2>&1 || true
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | tr -d '"')
          echo "=== Signing identities ==="
          security find-identity -v 2>&1 || true
          mkdir -p build/macos/pkg
          productbuild --sign "3rd Party Mac Developer Installer: Sandeep Gyani (V59U3N3H3V)" \
            --keychain "$KC" \
            --component "$APP" /Applications \
            build/macos/pkg/CyberSecurityAssessment.pkg
          echo "=== PKG built ==="
          ls -la build/macos/pkg/
    artifacts:
      - build/macos/pkg/*.pkg
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
