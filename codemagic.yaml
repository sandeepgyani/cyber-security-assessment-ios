workflows:
  ios-release:
    name: iOS Release (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: PCS_ASC_KEY
    environment:
      ios_signing:
        certificates:
          - pcs_distribution
        provisioning_profiles:
          - pcs_appstore_profile
      node: latest
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Sync web assets into iOS project
        script: |
          node -v
          npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
  macos-release:
    name: macOS Release (native)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: PCS_ASC_KEY
    environment:
      ios_signing:
        certificates:
          - pcs_distribution
        provisioning_profiles:
          - pcs_macos_profile
      xcode: latest
    scripts:
      - name: Create Mac Installer certificate on build machine
        script: |
          set -e
          # Generate a fresh private key on this ephemeral machine and create the
          # installer certificate via the ASC API. keychain add-certificates then
          # imports it into Codemagic's build keychain with proper (non-interactive)
          # access for productbuild — using the keychain password the CLI itself owns.
          openssl genrsa -out /tmp/inst_key.pem 2048
          app-store-connect create-certificate \
            --type MAC_INSTALLER_DISTRIBUTION \
            --certificate-key=@file:/tmp/inst_key.pem \
            --save
          keychain add-certificates
          echo "=== Signing identities after add ==="
          security find-identity -v 2>&1 || true
      - name: Build macOS archive and package pkg
        script: |
          set -e
          xcodebuild -project macos/MacApp.xcodeproj -scheme MacApp \
            -destination 'generic/platform=macOS' \
            -archivePath build/macos/App.xcarchive archive
          APP=$(find build/macos/App.xcarchive/Products/Applications -maxdepth 1 -name '*.app' | head -1)
          echo "=== Archived app: $APP ==="
          if [ -f "$APP/Contents/embedded.provisionprofile" ]; then echo "embedded.provisionprofile PRESENT"; else echo "WARNING: no embedded profile"; fi
          INSTALLER_ID=$(security find-identity -v | grep -o '3rd Party Mac Developer Installer: [^"]*' | head -1)
          echo "=== Installer identity: $INSTALLER_ID ==="
          mkdir -p build/macos/pkg
          productbuild --sign "$INSTALLER_ID" \
            --component "$APP" /Applications \
            build/macos/pkg/CyberSecurityAssessment.pkg
          echo "=== PKG built ==="
          ls -la build/macos/pkg/
    artifacts:
      - build/macos/pkg/*.pkg
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
