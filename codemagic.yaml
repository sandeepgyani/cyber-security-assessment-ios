workflows:
  ios-release:
    name: iOS Release (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: PCS_ASC_KEY
    environment:
      ios_signing:
        certificates:
          - pcs_distribution
        provisioning_profiles:
          - pcs_appstore_profile
      node: latest
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Sync web assets into iOS project
        script: |
          node -v
          npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
  macos-release:
    name: macOS Release (native)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: PCS_ASC_KEY
    environment:
      ios_signing:
        certificates:
          - pcs_distribution
          - pcs_mac_installer
        provisioning_profiles:
          - pcs_macos_profile
      xcode: latest
    scripts:
      - name: Install provisioning profile
        script: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision /tmp/ 2>/dev/null || true
          find "$HOME" -name '*.mobileprovision' 2>/dev/null | head -20
      - name: Build macOS archive and package pkg manually
        script: |
          set -e
          echo "=== Signing identities ==="
          security find-identity -v 2>&1 || true
          echo "=========================="
          xcodebuild -project macos/MacApp.xcodeproj -scheme MacApp \
            -destination 'generic/platform=macOS' \
            -archivePath build/macos/App.xcarchive archive
          APP=$(find build/macos/App.xcarchive/Products/Applications -maxdepth 1 -name '*.app' | head -1)
          echo "=== Archived app: $APP ==="
          if [ -f "$APP/Contents/embedded.provisionprofile" ]; then echo "embedded.provisionprofile PRESENT"; else echo "WARNING: no embedded profile"; fi
          codesign -dvv "$APP" 2>&1 | grep -i 'authority\|identifier\|team' || true
          echo "=== Granting non-interactive keychain access for productbuild ==="
          security list-keychains -d user
          for KC in $(security list-keychains -d user | tr -d ' "'); do
            echo "-- $KC"
            security unlock-keychain -p "" "$KC" 2>&1 | tail -1 || true
            security set-key-partition-list -S apple-tool:,apple:,codesign:,unsigned: -s -k "" "$KC" 2>&1 | tail -2 || echo "  (empty-pw partition set failed for $KC)"
          done
          mkdir -p build/macos/pkg
          productbuild --sign "3rd Party Mac Developer Installer: Sandeep Gyani (V59U3N3H3V)" \
            --component "$APP" /Applications \
            build/macos/pkg/CyberSecurityAssessment.pkg
          echo "=== PKG built ==="
          ls -la build/macos/pkg/
    artifacts:
      - build/macos/pkg/*.pkg
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
